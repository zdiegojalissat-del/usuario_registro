<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Usuario</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header>
    <h1>Registro de Usuario</h1>
  </header>

  <main>

    <div class="container">

      <img
      src="https://via.placeholder.com/120"
      alt="Perfil"
      class="perfil">

      <form id="formulario">

        <label for="nombre">
          Nombre
        </label>

        <input
        type="text"
        id="nombre"
        placeholder="Ingresa tu nombre"
        required>

        <label for="correo">
          Correo electrónico
        </label>

        <input
        type="email"
        id="correo"
        placeholder="ejemplo@gmail.com"
        required>

        <label for="password">
          Contraseña
        </label>

        <input
        type="password"
        id="password"
        minlength="8"
        placeholder="Mínimo 8 caracteres"
        required>

        <label for="fecha">
          Fecha de nacimiento
        </label>

        <input
        type="date"
        id="fecha"
        required>

        <label for="color">
          Color favorito
        </label>

        <input
        type="color"
        id="color">

        <label for="pais">
          País
        </label>

        <input
        list="paises"
        id="pais"
        placeholder="Selecciona tu país"
        required>

        <datalist id="paises">
          <option value="México">
          <option value="Argentina">
          <option value="Colombia">
          <option value="Chile">
          <option value="Perú">
          <option value="España">
          <option value="Estados Unidos">
        </datalist>

        <button type="submit">
          Registrarse
        </button>

        <p id="mensaje"></p>

      </form>

    </div>

  </main>

  <footer>
    <p>
      Registro de Usuario © 2026
    </p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
